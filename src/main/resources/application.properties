quarkus.openapi.generator.spec=openapi.yml
# ── CORS Configuration ─────────────────────────────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=${FE_URL:*}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=content-disposition
quarkus.http.cors.access-control-max-age=24H
quarkus.http.port=${PORT:8080}
# ── JWT Configuration ──────────────────────────────────────────────────────────
mp.jwt.verify.publickey.location=${PUBLIC_KEY_PATH:publicKey.pem}
mp.jwt.verify.issuer=portfolio-be
smallrye.jwt.sign.key.location=${PRIVATE_KEY_PATH:privateKey.pem}
# ── Admin Credentials (read by AuthServiceImpl) ────────────────────────────────
app.admin.username=${ADMIN_USER:admin}
app.admin.password=${ADMIN_PASS:admin123}
# ── HTTP Security: protect /admin/** with JWT ──────────────────────────────────
quarkus.http.auth.permission.authenticated.paths=/admin/*
quarkus.http.auth.permission.authenticated.policy=authenticated
# ── MongoDB Configuration ──────────────────────────────────────────────────────
quarkus.mongodb.connection-string=${MONGO_URI}
quarkus.mongodb.database=${MONGO_DB:portfolio}
# ── Optional MongoDB tuning ────────────────────────────────────────────────────
# Connection pool
quarkus.mongodb.max-pool-size=10
quarkus.mongodb.min-pool-size=2
# Timeouts (milliseconds)
quarkus.mongodb.connect-timeout=10000
quarkus.mongodb.server-selection-timeout=5000
